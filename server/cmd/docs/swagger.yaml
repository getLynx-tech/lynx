definitions:
  request.DeviceRequest:
    properties:
      device_id:
        type: string
      readings:
        items:
          $ref: '#/definitions/request.Reading'
        type: array
    required:
    - device_id
    - readings
    type: object
  request.Reading:
    properties:
      dist:
        type: integer
      id:
        type: string
      rssi:
        type: integer
    required:
    - dist
    - id
    - rssi
    type: object
  response.Root:
    properties:
      message:
        type: string
    required:
    - message
    type: object
info:
  contact: {}
  title: Lynx API
  version: "1.0"
paths:
  /:
    get:
      operationId: getRoot
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Root'
      summary: Get root
      tags:
      - root
  /devices/position:
    post:
      operationId: updateDevicePosition
      parameters:
      - description: Device Request
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.DeviceRequest'
      responses:
        "200":
          description: OK
      summary: UpdateDevicePosition
      tags:
      - device
swagger: "2.0"
