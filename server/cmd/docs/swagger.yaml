definitions:
  request.CreatePolygon:
    properties:
      id:
        type: string
      vertices:
        items:
          $ref: '#/definitions/request.Vertex'
        type: array
    required:
    - id
    - vertices
    type: object
  request.Vertex:
    properties:
      latitude:
        type: number
      longitude:
        type: number
    type: object
  response.Root:
    properties:
      message:
        type: string
    required:
    - message
    type: object
info:
  contact: {}
  title: Lynx API
  version: "1.0"
paths:
  /:
    get:
      operationId: getRoot
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/response.Root'
      summary: Get root
      tags:
      - root
  /polygon:
    post:
      operationId: createPolygon
      parameters:
      - description: User ID
        in: header
        name: X-User-ID
        required: true
        type: string
      - description: Create Polygon
        in: body
        name: data
        required: true
        schema:
          $ref: '#/definitions/request.CreatePolygon'
      responses:
        "201":
          description: Created
      summary: Create Polygon
      tags:
      - polygon
swagger: "2.0"
