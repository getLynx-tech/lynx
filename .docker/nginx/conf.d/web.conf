upstream client {
    server client:5173;
}

server {
    listen 80;
    listen 443 ssl;
    server_name dev.getlynx.tech;

    ssl_certificate     /etc/nginx/dev.getlynx.tech.crt;
    ssl_certificate_key /etc/nginx/dev.getlynx.tech.key;

    client_max_body_size 100M;

    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;

    location / {
        proxy_pass http://client;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }
}

upstream server {
    server server:9090;
}

server {
    listen 80;
    listen 443 ssl;
    server_name api.dev.getlynx.tech;

    ssl_certificate     /etc/nginx/api.dev.getlynx.tech.crt;
    ssl_certificate_key /etc/nginx/api.dev.getlynx.tech.key;

    client_max_body_size 100M;

    proxy_connect_timeout 7d;
    proxy_send_timeout 7d;
    proxy_read_timeout 7d;

    location / {
        proxy_pass http://server;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
      }
}